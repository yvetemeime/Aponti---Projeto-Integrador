{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card p-4 shadow border-0">
            <h3 class="text-danger fw-bold"><i class="fas fa-exclamation-triangle me-2"></i>Confirmar Exclusão</h3>
            <p class="text-muted">Você tem certeza que deseja excluir o registro: <strong>"{{ object.titulo }}"</strong>?</p>
            <form method="post">
                {% csrf_token %}
                <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                    <a href="{% url 'registro_list' %}" class="btn btn-light">Cancelar</a>
                    <button type="submit" class="btn btn-danger px-4">Sim, excluir permanentemente</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
