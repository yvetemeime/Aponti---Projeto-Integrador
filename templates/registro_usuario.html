{% extends 'base.html' %}
{% load django_bootstrap5 %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 85vh;">
    <div class="col-md-5">
        <div class="card border-0 shadow-lg" style="border-radius: 20px; overflow: hidden;">
            
            <div class="card-header bg-primary text-white text-center py-4 border-0">
                <div class="mb-3">
                    <i class="fas fa-user-plus fa-3x"></i>
                </div>
                <h3 class="fw-bold mb-0">Novo Associado</h3>
                <small class="text-white-50 text-uppercase">Plataforma HSBS Intelligence</small>
            </div>

            <div class="card-body p-5 bg-white">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="hsbs-input-style">
                        {% bootstrap_form form %}
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary rounded-pill py-3 fw-bold shadow-sm btn-hover-effect">
                            CRIAR MINHA CONTA <i class="fas fa-check-circle ms-2"></i>
                        </button>
                    </div>
                </form>
            </div>
            
            <div class="card-footer bg-light text-center py-3 border-0">
                <span class="text-muted small">Já possui credenciais? </span>
                <a href="{% url 'login' %}" class="text-primary fw-bold small text-decoration-none">Acesse o Painel</a>
            </div>
        </div>
        
        <p class="text-center text-muted mt-4 small">
            &copy; 2026 HSBS Intelligence | Auditoria e BI
        </p>
    </div>
</div>

<style>
    /* Deixa os campos do Bootstrap arredondados (estilo Pill) */
    .hsbs-input-style input, 
    .hsbs-input-style select, 
    .hsbs-input-style textarea {
        border-radius: 50px !important;
        padding-left: 20px !important;
        padding-right: 20px !important;
        border: 1px solid #ced4da !important;
        margin-bottom: 5px !important;
    }

    /* Efeito de foco azul suave nos campos */
    .hsbs-input-style input:focus {
        border-color: #0d6efd !important;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15) !important;
    }

    /* Labels menores e mais elegantes */
    .hsbs-input-style label {
        font-weight: 600;
        color: #6c757d;
        font-size: 0.85rem;
        margin-left: 15px;
        text-transform: uppercase;
    }

    /* Efeito de levitação no botão ao passar o mouse */
    .btn-hover-effect {
        transition: all 0.3s ease;
    }
    .btn-hover-effect:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 15px rgba(13, 110, 253, 0.3) !important;
    }

    /* Background da página para destacar o Card */
    body {
        background-color: #f4f7f6;
    }
</style>
{% endblock %}
